services:
  - type: web
    name: learning-log
    env: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn learning_log.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: learning-log-db
          property: connectionString

databases:
  - name: learning-log-db
    plan: free